<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4a63"/>
      <stop offset="1" stop-color="#1c2331"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5bc8ff"/>
      <stop offset="1" stop-color="#4aa8f0"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7ee6a8"/>
      <stop offset="1" stop-color="#4ad991"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8ff0b6"/>
      <stop offset="1" stop-color="#3fce88"/>
    </linearGradient>
  </defs>

  <!-- App-icon plate, matching the Gapless family style. -->
  <rect x="4" y="4" width="120" height="120" rx="27" fill="url(#bg)"/>
  <rect x="4.5" y="4.5" width="119" height="119" rx="26.5" fill="none"
        stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>

  <!-- A 2×2 grid of app tiles: this is a manager of apps. -->
  <g>
    <rect x="26" y="26" width="32" height="32" rx="8" fill="url(#blue)"/>
    <rect x="70" y="26" width="32" height="32" rx="8" fill="url(#green)"/>
    <rect x="26" y="70" width="32" height="32" rx="8" fill="url(#green)"/>
    <rect x="70" y="70" width="32" height="32" rx="8" fill="url(#blue)"/>
    <!-- faint face highlight on each tile -->
    <g fill="#ffffff" fill-opacity="0.14">
      <rect x="26" y="26" width="32" height="10" rx="8"/>
      <rect x="70" y="26" width="32" height="10" rx="8"/>
      <rect x="26" y="70" width="32" height="10" rx="8"/>
      <rect x="70" y="70" width="32" height="10" rx="8"/>
    </g>
  </g>

  <!-- Update badge over the lower-right tile: the app keeps things current. -->
  <circle cx="94" cy="94" r="20" fill="url(#bg)"/>
  <circle cx="94" cy="94" r="16" fill="url(#badge)"/>
  <path d="M94 84 v14 M94 100 l-7 -7 M94 100 l7 -7"
        fill="none" stroke="#12351f" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
